
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belzona CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red: #C8102E;
  --red-dark: #8B0A1F;
  --red-glow: rgba(200,16,46,0.3);
  --gold: #F4A300;
  --green: #00c896;
  --blue: #3b82f6;
  --bg: #0f1623;
  --bg2: #161f30;
  --bg3: #1e2b40;
  --border: rgba(255,255,255,0.07);
  --text: #e8edf5;
  --muted: #6b80a0;
  --card: rgba(22,31,48,0.97);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ===== SCREENS ===== */
.screen { display:none; min-height:100vh; }
.screen.active { display:flex; flex-direction:column; }

/* ===== LOGIN ===== */
#loginScreen {
  align-items:center; justify-content:center;
  background: radial-gradient(ellipse at 30% 30%, rgba(200,16,46,0.12), transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(244,163,0,0.06), transparent 50%), var(--bg);
}
.login-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}
.login-logo {
  width: 64px; height: 64px;
  background: var(--red);
  border-radius: 16px;
  display: flex; align-items:center; justify-content:center;
  font-size: 22px; font-weight: 900;
  margin: 0 auto 20px;
  box-shadow: 0 8px 30px var(--red-glow);
}
.login-title { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.login-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
.input-group { margin-bottom: 14px; text-align: right; }
.input-group label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; font-weight:600; }
.input-group input, .input-group select, .input-group textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  direction: rtl;
}
.input-group input:focus, .input-group select:focus, .input-group textarea:focus {
  border-color: rgba(200,16,46,0.5);
}
.input-group select option { background: var(--bg3); }
.input-group textarea { resize: vertical; min-height: 80px; }
.btn-main {
  width: 100%; padding: 13px;
  background: var(--red); color: white;
  border: none; border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  margin-top: 8px;
}
.btn-main:hover { background: #e01535; transform: translateY(-1px); box-shadow: 0 6px 20px var(--red-glow); }

/* ===== MAIN APP ===== */
#appScreen { flex-direction: row; }

/* SIDEBAR */
.sidebar {
  width: 240px; min-height: 100vh;
  background: rgba(10,15,24,0.98);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; right: 0; top: 0; height: 100vh;
  z-index: 100;
}
.sb-logo {
  padding: 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sb-logo-icon {
  width: 38px; height: 38px;
  background: var(--red); border-radius: 10px;
  display: flex; align-items:center; justify-content:center;
  font-weight: 900; font-size: 13px;
  box-shadow: 0 4px 12px var(--red-glow);
}
.sb-logo-text .brand { font-size: 14px; font-weight: 800; }
.sb-logo-text .sub { font-size: 10px; color: var(--muted); }
.sb-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  cursor: pointer; transition: all 0.15s;
  font-size: 13px; font-weight: 600; color: var(--muted);
  margin-bottom: 2px; border: 1px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.nav-item.active { background: rgba(200,16,46,0.12); color: white; border-color: rgba(200,16,46,0.25); }
.nav-item .ni { font-size: 16px; width: 18px; }
.nav-badge {
  margin-right: auto;
  background: var(--red); color: white;
  font-size: 10px; padding: 1px 7px;
  border-radius: 20px; font-weight: 700;
}
.sb-user {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sb-avatar {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--red), var(--gold));
  border-radius: 50%;
  display: flex; align-items:center; justify-content:center;
  font-weight: 700; font-size: 13px;
}
.sb-user-info .name { font-size: 12px; font-weight: 700; }
.sb-user-info .role { font-size: 10px; color: var(--muted); }
.logout-btn {
  margin-right: auto; background: transparent; border: none;
  color: var(--muted); cursor: pointer; font-size: 16px;
  transition: color 0.2s;
}
.logout-btn:hover { color: var(--red); }

/* MAIN */
.main { margin-right: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: rgba(10,15,24,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 16px; font-weight: 800; }
.page-title span { color: var(--red); }
.topbar-right { display: flex; gap: 10px; align-items: center; }
.search-wrap {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 7px 12px;
}
.search-wrap input {
  background: none; border: none; outline: none;
  color: var(--text); font-family: 'Cairo',sans-serif;
  font-size: 13px; width: 180px;
}
.search-wrap input::placeholder { color: var(--muted); }
.btn-add {
  padding: 8px 16px;
  background: var(--red); color: white;
  border: none; border-radius: 10px;
  font-family: 'Cairo',sans-serif; font-weight: 700; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.btn-add:hover { background: #e01535; box-shadow: 0 4px 14px var(--red-glow); }

/* CONTENT */
.content { padding: 22px; flex: 1; }

/* TABS */
.view-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
.view-tab {
  padding: 7px 16px; border-radius: 8px;
  font-size: 12px; font-weight: 700; cursor: pointer;
  border: 1px solid transparent; transition: all 0.2s; color: var(--muted);
}
.view-tab.active { background: rgba(200,16,46,0.12); color: white; border-color: rgba(200,16,46,0.3); }
.view-tab:hover:not(.active) { background: rgba(255,255,255,0.04); color: var(--text); }

/* CLIENTS GRID */
.clients-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.client-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
  animation: fadeUp 0.3s ease both;
}
.client-card:hover { transform: translateY(-3px); border-color: rgba(200,16,46,0.25); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.cc-header {
  padding: 16px 18px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.cc-avatar {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items:center; justify-content:center;
  font-weight: 900; font-size: 16px; flex-shrink: 0;
}
.cc-name { font-size: 14px; font-weight: 800; line-height: 1.3; }
.cc-engineer { font-size: 12px; color: var(--muted); margin-top: 2px; }
.cc-body { padding: 14px 18px; }
.cc-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; color: var(--muted); }
.cc-row strong { color: var(--text); }
.ind-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 700;
}
.cc-actions {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
.action-btn {
  flex: 1; padding: 8px 6px;
  border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  cursor: pointer; font-size: 18px;
  transition: all 0.15s; display: flex;
  flex-direction: column; align-items: center; gap: 2px;
  font-family: 'Cairo',sans-serif;
}
.action-btn span { font-size: 10px; font-weight: 700; }
.action-btn.wa:hover { background: rgba(37,211,102,0.1); color: #25D366; border-color: rgba(37,211,102,0.3); }
.action-btn.call:hover { background: rgba(59,130,246,0.1); color: var(--blue); border-color: rgba(59,130,246,0.3); }
.action-btn.map:hover { background: rgba(244,163,0,0.1); color: var(--gold); border-color: rgba(244,163,0,0.3); }
.action-btn.hist:hover { background: rgba(200,16,46,0.1); color: var(--red); border-color: rgba(200,16,46,0.3); }

/* LIST VIEW */
.clients-list { display: flex; flex-direction: column; gap: 8px; }
.list-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  display: grid;
  grid-template-columns: 2fr 1.5fr 1fr 1fr auto;
  gap: 12px; align-items: center;
  cursor: pointer; transition: all 0.15s;
}
.list-item:hover { border-color: rgba(200,16,46,0.2); background: rgba(200,16,46,0.03); }
.list-header { background: rgba(0,0,0,0.3) !important; cursor: default !important; font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 0.5px; }
.list-header:hover { background: rgba(0,0,0,0.3) !important; border-color: var(--border) !important; }

/* EMPTY */
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .empty-icon { font-size: 60px; margin-bottom: 16px; opacity: 0.4; }
.empty-state p { font-size: 15px; }
.empty-state small { font-size: 13px; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  z-index: 1000; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  animation: modalIn 0.25s ease;
}
@keyframes modalIn { from { opacity:0; transform:scale(0.95) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 16px; font-weight: 800; }
.modal-close {
  background: none; border: none; color: var(--muted);
  font-size: 22px; cursor: pointer; transition: color 0.15s; line-height: 1;
}
.modal-close:hover { color: var(--red); }
.modal-body { padding: 22px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
.btn-cancel {
  padding: 9px 18px; border-radius: 10px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-family: 'Cairo',sans-serif;
  font-weight: 700; font-size: 13px; cursor: pointer;
  transition: all 0.15s;
}
.btn-cancel:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.btn-save {
  padding: 9px 22px; border-radius: 10px;
  background: var(--red); border: none; color: white;
  font-family: 'Cairo',sans-serif; font-weight: 700; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.btn-save:hover { background: #e01535; box-shadow: 0 4px 14px var(--red-glow); }

/* DETAIL MODAL */
.detail-modal { max-width: 640px; }
.detail-top {
  padding: 22px 24px;
  background: linear-gradient(135deg, var(--red-dark), var(--bg3));
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
}
.detail-avatar {
  width: 56px; height: 56px;
  border-radius: 14px;
  display: flex; align-items:center; justify-content:center;
  font-weight: 900; font-size: 20px; flex-shrink: 0;
}
.detail-company { font-size: 18px; font-weight: 900; }
.detail-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 3px; }
.detail-contact-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 16px 0; }
.detail-btn {
  padding: 12px 8px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--bg3);
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; gap: 4px; font-size: 22px;
  transition: all 0.2s; font-family: 'Cairo',sans-serif;
  color: var(--text);
}
.detail-btn span { font-size: 11px; font-weight: 700; color: var(--muted); }
.detail-btn.wa:hover { background: rgba(37,211,102,0.1); border-color: rgba(37,211,102,0.4); }
.detail-btn.wa:hover span { color: #25D366; }
.detail-btn.call:hover { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.4); }
.detail-btn.call:hover span { color: var(--blue); }
.detail-btn.map:hover { background: rgba(244,163,0,0.1); border-color: rgba(244,163,0,0.4); }
.detail-btn.map:hover span { color: var(--gold); }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.info-item { background: var(--bg3); border-radius: 10px; padding: 12px 14px; }
.info-label { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
.info-value { font-size: 13px; font-weight: 700; }
.section-title {
  font-size: 11px; color: var(--muted); font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  margin: 18px 0 10px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* HISTORY */
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item {
  background: var(--bg3); border-radius: 10px; padding: 12px 14px;
  display: flex; align-items: flex-start; gap: 10px;
}
.history-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red); flex-shrink: 0; margin-top: 4px;
}
.history-content { flex: 1; }
.history-type { font-size: 12px; font-weight: 700; color: var(--gold); }
.history-desc { font-size: 13px; font-weight: 600; margin: 2px 0; }
.history-note { font-size: 11px; color: var(--muted); line-height: 1.5; }
.history-date { font-size: 10px; color: var(--muted); margin-top: 4px; }
.add-history-form { background: var(--bg3); border-radius: 12px; padding: 14px; margin-top: 10px; }
.add-history-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.btn-small {
  padding: 8px 16px; border-radius: 8px;
  background: var(--red); border: none; color: white;
  font-family: 'Cairo',sans-serif; font-weight: 700; font-size: 12px;
  cursor: pointer; transition: all 0.2s;
}
.btn-small:hover { background: #e01535; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 22px;
  font-size: 14px; font-weight: 600;
  z-index: 9999; opacity: 0; transition: opacity 0.3s;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  display: flex; align-items: center; gap: 8px;
}
.toast.show { opacity: 1; }
.toast.success { border-color: rgba(0,200,150,0.4); }
.toast.error { border-color: rgba(200,16,46,0.4); }

/* INDUSTRY COLORS */
.ind-petroleum { background: rgba(244,163,0,0.12); color: var(--gold); }
.ind-food { background: rgba(0,200,150,0.12); color: var(--green); }
.ind-cement { background: rgba(160,160,200,0.12); color: #aab; }
.ind-chemical { background: rgba(200,16,46,0.12); color: #e8334a; }
.ind-water { background: rgba(59,130,246,0.12); color: var(--blue); }
.ind-steel { background: rgba(150,180,220,0.12); color: #96b4dc; }
.ind-other { background: rgba(120,120,120,0.12); color: #888; }

/* MAP EMBED */
.map-embed {
  width: 100%; height: 200px;
  border-radius: 12px; border: 1px solid var(--border);
  overflow: hidden; margin-top: 8px;
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 8px; color: var(--muted);
  font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.map-embed:hover { border-color: rgba(244,163,0,0.3); color: var(--gold); }
.map-embed .map-icon { font-size: 36px; opacity: 0.5; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-right: 0; }
  .clients-grid { grid-template-columns: 1fr; }
  .info-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-logo">BZ</div>
    <div class="login-title">Belzona Egypt CRM</div>
    <div class="login-sub">نظام إدارة عملاء Inter-Tech</div>
    <div class="input-group">
      <label>الاسم</label>
      <input type="text" id="loginName" placeholder="اكتب اسمك">
    </div>
    <div class="input-group">
      <label>الدور الوظيفي</label>
      <select id="loginRole">
        <option value="مدير مبيعات">مدير مبيعات</option>
        <option value="مندوب مبيعات">مندوب مبيعات</option>
        <option value="مهندس ميداني">مهندس ميداني</option>
        <option value="تسويق">فريق التسويق</option>
      </select>
    </div>
    <button class="btn-main" onclick="login()">دخول ←</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" class="screen">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">BZ</div>
      <div class="sb-logo-text">
        <div class="brand">Belzona Egypt</div>
        <div class="sub">إدارة العملاء</div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="nav-item active" onclick="setNav(this,'clients')">
        <span class="ni">🏭</span> العملاء
        <span class="nav-badge" id="clientsBadge">0</span>
      </div>
      <div class="nav-item" onclick="setNav(this,'history')">
        <span class="ni">📋</span> سجل التعاملات
      </div>
    </nav>
    <div class="sb-user">
      <div class="sb-avatar" id="userAvatar">أ</div>
      <div class="sb-user-info">
        <div class="name" id="userName">—</div>
        <div class="role" id="userRole">—</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="خروج">⏻</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="page-title">قائمة <span>العملاء</span></div>
      <div class="topbar-right">
        <div class="search-wrap">
          <span style="color:var(--muted)">🔍</span>
          <input type="text" id="searchInput" placeholder="ابحث..." oninput="renderClients()">
        </div>
        <label class="btn-add" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);cursor:pointer;" title="استيراد من Excel">
          📥 استيراد Excel
          <input type="file" accept=".xlsx,.xls" style="display:none" onchange="importExcel(this)">
        </label>
        <button class="btn-add" style="background:var(--bg3);border:1px solid var(--border);color:var(--text)" onclick="loadFromSheet()">🔄 تزامن</button>
        <button class="btn-add" onclick="openAddModal()">＋ عميل جديد</button>
      </div>
    </div>

    <div class="content">
      <div class="view-tabs">
        <div class="view-tab active" onclick="setView('grid',this)">⊞ بطاقات</div>
        <div class="view-tab" onclick="setView('list',this)">☰ قائمة</div>
      </div>
      <div id="clientsContainer"></div>
    </div>
  </main>
</div>

<!-- ADD CLIENT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">➕ إضافة عميل جديد</div>

let clients = JSON.parse(localStorage.getItem('bz_clients') || '[]');

const INDUSTRY_STYLES = {

const AVATAR_COLORS = [

  'linear-gradient(135deg,#F4A300,#a06b00)',

function login() {

function renderClients() {

    c.engineer.toLowerCase().includes(q) ||

    c.industry.toLowerCase().includes(q)

  const container = document.getElementById('clientsContainer');

  if (clients.length === 0) {

  }
}

  return AVATAR_COLORS[hash % AVATAR_COLORS.length];
}

function addHistory(idx) {
  const type = document.getElementById('h_type').value;
  const date = document.getElementById('h_date').value;
  const title = document.getElementById('h_title').value.trim();
  const note = document.getElementById('h_note').value.trim();

  if (!title) { showToast('❌ اكتب عنوان التعامل', 'error'); return; }

  if (!clients[idx].history) clients[idx].history = [];
  clients[idx].history.push({
    type, date: new Date(date).toLocaleDateString('ar-EG'),
    title, note, by: currentUser.name
  });

  saveData();
  showToast('✅ تم تسجيل التعامل', 'success');
  openDetail(idx);
}

function deleteClient(idx) {
  if (!confirm('هل أنت متأكد من حذف هذا العميل؟')) return;
  clients.splice(idx, 1);
  saveData();
  closeModal('detailModal');
  renderClients();
  showToast('🗑️ تم حذف العميل', 'success');
}

// ===== EXCEL IMPORT =====
function importExcel(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary' });

      let added = 0, skipped = 0;

      // Detect file format type
      const wb = XLSX.read(e.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const allRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      // Detect if this is "vertical" format (company name in col D, address in col A)
      const firstDataRow = allRows[0] || [];
      const isVerticalFormat = (
        firstDataRow.length >= 4 &&
        (firstDataRow[3]?.toString().includes('إسم') || firstDataRow[3]?.toString().includes('اسم') || firstDataRow[3]?.toString().includes('عميل'))
      );

      if (isVerticalFormat) {
        // Handle vertical format: each company takes multiple rows
        // Row pattern: [address, value, type(تليفون/محمول/فاكس/بريد), companyName]
        let i = 1; // skip header
        while (i < allRows.length) {
          const row = allRows[i];
          const company = (row[3] || '').toString().trim();
          const address = (row[0] || '').toString().trim();
          if (!company) { i++; continue; }
          if (clients.find(c => c.company.trim() === company)) { 
            // skip all rows for this company
            i++;
            while (i < allRows.length && !allRows[i][3]) i++;
            skipped++; continue; 
          }

          let phone = '', mobile = '', email = '';
          // Current row
          const type0 = (row[2] || '').toString().trim();
          const val0 = (row[1] || '').toString().trim();
          if (type0 === 'تليفون') phone = val0;
          else if (type0 === 'محمول') mobile = val0;
          else if (type0 === 'بريد إلكترونى') email = val0;

          // Read next rows until new company
          i++;
          while (i < allRows.length && !allRows[i][3]) {
            const t = (allRows[i][2] || '').toString().trim();
            const v = (allRows[i][1] || '').toString().trim();
            if (t === 'محمول') mobile = v;
            else if (t === 'تليفون' && !phone) phone = v;
            else if (t === 'بريد إلكترونى') email = v;
            i++;
          }

          clients.push({
            id: Date.now() + Math.random(),
            company,
            industry: 'أخرى',
            region: extractRegion(address) || 'غير محدد',
            address,
            engineer: 'غير محدد',
            phone: mobile || phone || 'غير محدد',
            whatsapp: '',
            email,
            notes: '',
            createdAt: new Date().toLocaleDateString('ar-EG'),
            history: []
          });
          added++;
        }
      } else {
      
      // Find the header row index
      let headerRowIdx = 0;
      const companyKeywords = ['company name', 'الشركة', 'اسم الشركة', 'company'];
      for (let i = 0; i < Math.min(10, allRows.length); i++) {
        const rowStr = allRows[i].join('|').toLowerCase();
        if (companyKeywords.some(k => rowStr.includes(k))) {
          headerRowIdx = i;
          break;
        }
      }

      // Build rows with correct header
      const headers = allRows[headerRowIdx];
      const rows = [];
      for (let i = headerRowIdx + 1; i < allRows.length; i++) {
        const rowObj = {};
        headers.forEach((h, j) => { rowObj[h] = allRows[i][j]; });
        rows.push(rowObj);
      }

      let lastCompany = null;
      let lastAddress = null;

      rows.forEach(row => {
        // Support both English and Arabic column names
        const company = (
          row['Company Name'] || row['company name'] ||
          row['اسم الشركة'] || row['الشركة'] || row['شركة'] || ''
        ).toString().trim();

        const address = (
          row['address'] || row['Address'] ||
          row['العنوان'] || row['عنوان'] || ''
        ).toString().trim();

        const contact = (
          row['Contact Name'] || row['contact name'] ||
          row['اسم الشخص  '] || row['اسم الشخص'] || row['اسم المسؤول'] ||
          row['الاسم'] || ''
        ).toString().trim();

        const phone = (
          row['mobile'] || row['Mobile'] || row['Mob '] || row['Mob'] ||
          row['Telephone'] || row['telephone'] || row['Tel '] || row['Tel'] ||
          row['تليفون'] || row['موبايل'] || ''
        ).toString().trim();

        const email = (
          row['E-mail'] || row['email'] || row['Email'] || row['e-mail'] ||
          row['الإيميل'] || ''
        ).toString().trim();

        // Use last known company if current row has no company (multi-contact rows)
        const effectiveCompany = company || lastCompany;
        const effectiveAddress = address || lastAddress;

        if (!effectiveCompany) { skipped++; return; }

        // Update last known company
        if (company) { lastCompany = company; lastAddress = address; }

        // Only add once per company (first occurrence)
        if (!company) { skipped++; return; }

        // Check duplicate
        if (clients.find(c => c.company.trim() === effectiveCompany.trim())) { skipped++; return; }

        const region = extractRegion(effectiveAddress);

        clients.push({
          id: Date.now() + Math.random(),
          company: effectiveCompany,
          industry: 'أخرى',
          region: region || 'غير محدد',
          address: effectiveAddress,
          engineer: contact || 'غير محدد',
          phone: phone || 'غير محدد',
          whatsapp: '',
          email,
          notes: '',
          createdAt: new Date().toLocaleDateString('ar-EG'),
          history: []
        });
        added++;
      });
      } // end else (standard format)

      saveData();
      renderClients();
      input.value = '';
      showToast(`✅ تم استيراد ${added} عميل — تم تخطي ${skipped}`, 'success');
    } catch(err) {
      showToast('❌ خطأ في قراءة الملف', 'error');
    }
  };
  reader.readAsBinaryString(file);
}

function extractRegion(address) {
  const regions = ['القاهرة','الإسكندرية','السويس','الإسماعيلية','بورسعيد','الغربية','الشرقية','أسيوط','أسوان','الجيزة','السادس من اكتوبر','أكتوبر','العاشر من رمضان','العبور','بدر','المنصورة','الزقازيق','طنطا','دمياط'];
  for (let r of regions) {
    if (address && address.includes(r)) return r;
  }
  return '';
}

// ===== UTILS =====
function saveData() {
  localStorage.setItem('bz_clients', JSON.stringify(clients));
  fetch(SHEET_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'save', clients: clients })
  }).catch(() => {});
}

async function loadFromSheet() {
  try {
    showToast('⏳ جاري تحميل البيانات...', 'success');
    const res = await fetch(SHEET_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'load' })
    });
    const data = await res.json();
    if (data.status === 'ok' && data.clients.length > 0) {
      clients = data.clients;
      localStorage.setItem('bz_clients', JSON.stringify(clients));
      renderClients();
      showToast(`✅ تم تحميل ${clients.length} عميل من Google Sheets`, 'success');
    }
  } catch(e) {
    showToast('⚠️ تعذر الاتصال بـ Google Sheets', 'error');
  }
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});
</script>
