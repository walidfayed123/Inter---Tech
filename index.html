
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belzona CRM - Inter-Tech</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red:#C8102E;--red-dark:#8B0A1F;--red-glow:rgba(200,16,46,0.3);
  --gold:#F4A300;--green:#00c896;--blue:#3b82f6;
  --bg:#0f1623;--bg2:#161f30;--bg3:#1e2b40;
  --border:rgba(255,255,255,0.07);--text:#e8edf5;--muted:#6b80a0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}
#loginScreen{align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 30%,rgba(200,16,46,0.12),transparent 60%),var(--bg);}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.5);}
.login-logo{width:64px;height:64px;background:var(--red);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;margin:0 auto 20px;box-shadow:0 8px 30px var(--red-glow);}
.login-title{font-size:22px;font-weight:900;margin-bottom:6px;}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:32px;}
.ig{margin-bottom:14px;text-align:right;}
.ig label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.ig input,.ig select,.ig textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;direction:rtl;}
.ig input:focus,.ig select:focus{border-color:rgba(200,16,46,0.5);}
.ig select option{background:var(--bg3);}
.ig textarea{resize:vertical;min-height:80px;}
.btn-main{width:100%;padding:13px;background:var(--red);color:white;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.btn-main:hover{background:#e01535;transform:translateY(-1px);box-shadow:0 6px 20px var(--red-glow);}
.btn-main:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.login-error{color:#e8334a;font-size:12px;margin-top:10px;display:none;background:rgba(200,16,46,0.1);padding:8px;border-radius:8px;}
#appScreen{flex-direction:row;}
.sidebar{width:240px;min-height:100vh;background:rgba(10,15,24,0.98);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;right:0;top:0;height:100vh;z-index:100;}
.sb-logo{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-logo-icon{width:38px;height:38px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;box-shadow:0 4px 12px var(--red-glow);}
.sb-logo-text .brand{font-size:14px;font-weight:800;}
.sb-logo-text .sub{font-size:10px;color:var(--muted);}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-sec{font-size:10px;color:var(--muted);padding:12px 12px 4px;letter-spacing:1px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all 0.15s;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:2px;border:1px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.nav-item.active{background:rgba(200,16,46,0.12);color:white;border-color:rgba(200,16,46,0.25);}
.ni{font-size:16px;width:18px;}
.nav-badge{margin-right:auto;background:var(--red);color:white;font-size:10px;padding:1px 7px;border-radius:20px;font-weight:700;}
.sb-user{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-av{width:34px;height:34px;background:linear-gradient(135deg,var(--red),var(--gold));border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.sb-ui .name{font-size:12px;font-weight:700;}
.role-badge{display:inline-block;padding:1px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.r-admin{background:rgba(244,163,0,0.15);color:var(--gold);}
.r-manager{background:rgba(59,130,246,0.15);color:var(--blue);}
.r-sales{background:rgba(0,200,150,0.15);color:var(--green);}
.logout-btn{margin-right:auto;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;transition:color 0.2s;}
.logout-btn:hover{color:var(--red);}
.main{margin-right:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:rgba(10,15,24,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.page-title{font-size:16px;font-weight:800;}
.page-title span{color:var(--red);}
.topbar-right{display:flex;gap:10px;align-items:center;}
.sw{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:7px 12px;}
.sw input{background:none;border:none;outline:none;color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;width:180px;}
.sw input::placeholder{color:var(--muted);}
.btn-add{padding:8px 16px;background:var(--red);color:white;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.btn-add:hover{background:#e01535;box-shadow:0 4px 14px var(--red-glow);}
.btn-sec{padding:8px 14px;background:var(--bg3);color:var(--muted);border:1px solid var(--border);border-radius:10px;font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.btn-sec:hover{color:var(--text);background:rgba(255,255,255,0.05);}
.content{padding:22px;flex:1;}
.view-tabs{display:flex;gap:6px;margin-bottom:20px;}
.view-tab{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all 0.2s;color:var(--muted);}
.view-tab.active{background:rgba(200,16,46,0.12);color:white;border-color:rgba(200,16,46,0.3);}
.view-tab:hover:not(.active){background:rgba(255,255,255,0.04);color:var(--text);}
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.client-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all 0.2s;animation:fadeUp 0.3s ease both;}
.client-card:hover{transform:translateY(-3px);border-color:rgba(200,16,46,0.25);box-shadow:0 8px 30px rgba(0,0,0,0.3);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.cc-header{padding:16px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.cc-av{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;flex-shrink:0;}
.cc-name{font-size:14px;font-weight:800;line-height:1.3;}
.cc-eng{font-size:12px;color:var(--muted);margin-top:2px;}
.cc-body{padding:14px 18px;}
.cc-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;color:var(--muted);}
.cc-row strong{color:var(--text);}
.ind-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;}
.cc-actions{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;}
.ab{flex:1;padding:8px 6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:18px;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'Cairo',sans-serif;}
.ab span{font-size:10px;font-weight:700;}
.ab.wa:hover{background:rgba(37,211,102,0.1);color:#25D366;border-color:rgba(37,211,102,0.3);}
.ab.call:hover{background:rgba(59,130,246,0.1);color:var(--blue);border-color:rgba(59,130,246,0.3);}
.ab.map:hover{background:rgba(244,163,0,0.1);color:var(--gold);border-color:rgba(244,163,0,0.3);}
.ab.hist:hover{background:rgba(200,16,46,0.1);color:var(--red);border-color:rgba(200,16,46,0.3);}
.clients-list{display:flex;flex-direction:column;gap:8px;}
.li{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr auto;gap:12px;align-items:center;cursor:pointer;transition:all 0.15s;}
.li:hover{border-color:rgba(200,16,46,0.2);background:rgba(200,16,46,0.03);}
.li-hdr{background:rgba(0,0,0,0.3)!important;cursor:default!important;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.5px;}
.li-hdr:hover{background:rgba(0,0,0,0.3)!important;border-color:var(--border)!important;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:60px;margin-bottom:16px;opacity:0.4;}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.mo.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:mi 0.25s ease;}
@keyframes mi{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mh{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mt{font-size:16px;font-weight:800;}
.mc{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;}
.mc:hover{color:var(--red);}
.mb{padding:22px 24px;}
.mf{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.btn-cancel{padding:9px 18px;border-radius:10px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
.btn-cancel:hover{color:var(--text);background:rgba(255,255,255,0.05);}
.btn-save{padding:9px 22px;border-radius:10px;background:var(--red);border:none;color:white;font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;}
.btn-save:hover{background:#e01535;}
.detail-modal{max-width:640px;}
.dt{padding:22px 24px;background:linear-gradient(135deg,var(--red-dark),var(--bg3));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;}
.d-av{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;flex-shrink:0;}
.d-company{font-size:18px;font-weight:900;}
.d-sub{font-size:13px;color:rgba(255,255,255,0.6);margin-top:3px;}
.d-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0;}
.d-btn{padding:12px 8px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:22px;transition:all 0.2s;font-family:'Cairo',sans-serif;color:var(--text);}
.d-btn span{font-size:11px;font-weight:700;color:var(--muted);}
.d-btn.wa:hover{background:rgba(37,211,102,0.1);border-color:rgba(37,211,102,0.4);}
.d-btn.wa:hover span{color:#25D366;}
.d-btn.call:hover{background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.4);}
.d-btn.call:hover span{color:var(--blue);}
.d-btn.map:hover{background:rgba(244,163,0,0.1);border-color:rgba(244,163,0,0.4);}
.d-btn.map:hover span{color:var(--gold);}
.ig-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.ii{background:var(--bg3);border-radius:10px;padding:12px 14px;}
.il{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.5px;margin-bottom:4px;}
.iv{font-size:13px;font-weight:700;}
.sec-title{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.hl{display:flex;flex-direction:column;gap:8px;}
.hi{background:var(--bg3);border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;}
.hd{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:4px;}
.hc{flex:1;}
.ht{font-size:12px;font-weight:700;color:var(--gold);}
.htt{font-size:13px;font-weight:600;margin:2px 0;}
.hn{font-size:11px;color:var(--muted);line-height:1.5;}
.hdate{font-size:10px;color:var(--muted);margin-top:4px;}
.ahf{background:var(--bg3);border-radius:12px;padding:14px;margin-top:10px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.btn-sm{padding:8px 16px;border-radius:8px;background:var(--red);border:none;color:white;font-family:'Cairo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}
.map-embed{width:100%;height:140px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.map-embed:hover{border-color:rgba(244,163,0,0.3);color:var(--gold);}
.users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.uc{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;}
.uc-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.uc-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;}
.uc-name{font-size:15px;font-weight:800;}
.uc-email{font-size:11px;color:var(--muted);}
.btn-danger{padding:7px 14px;border-radius:8px;background:rgba(200,16,46,0.1);border:1px solid rgba(200,16,46,0.3);color:#e8334a;font-family:'Cairo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all 0.2s;}
.btn-danger:hover{background:rgba(200,16,46,0.2);}
.ind-petroleum{background:rgba(244,163,0,0.12);color:var(--gold);}
.ind-food{background:rgba(0,200,150,0.12);color:var(--green);}
.ind-cement{background:rgba(160,160,200,0.12);color:#aab;}
.ind-chemical{background:rgba(200,16,46,0.12);color:#e8334a;}
.ind-water{background:rgba(59,130,246,0.12);color:var(--blue);}
.ind-steel{background:rgba(150,180,220,0.12);color:#96b4dc;}
.ind-other{background:rgba(120,120,120,0.12);color:#888;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 22px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;box-shadow:0 8px 30px rgba(0,0,0,0.4);display:flex;align-items:center;gap:8px;}
.toast.show{opacity:1;}
.toast.success{border-color:rgba(0,200,150,0.4);}
.toast.error{border-color:rgba(200,16,46,0.4);}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);gap:10px;font-size:14px;}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:sp 0.8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:768px){.sidebar{display:none;}.main{margin-right:0;}.clients-grid{grid-template-columns:1fr;}.ig-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-logo">BZ</div>
    <div class="login-title">Belzona Egypt CRM</div>
    <div class="login-sub">نظام إدارة عملاء Inter-Tech</div>
    <div class="ig"><label>البريد الإلكتروني</label>
      <input type="email" id="loginEmail" placeholder="example@intertech.com" style="direction:ltr;text-align:right" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="ig"><label>كلمة السر</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="btn-main" onclick="login()" id="loginBtn">دخول ←</button>
  </div>
</div>

<div id="appScreen" class="screen">
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">BZ</div>
      <div class="sb-logo-text"><div class="brand">Belzona Egypt</div><div class="sub">إدارة العملاء</div></div>
    </div>
    <nav class="sb-nav">
      <div class="nav-sec">القائمة الرئيسية</div>
      <div class="nav-item active" onclick="showPage('clients',this)"><span class="ni">🏭</span> العملاء <span class="nav-badge" id="clientsBadge">0</span></div>
      <div class="nav-item" onclick="showPage('history',this)"><span class="ni">📋</span> سجل التعاملات</div>
      <div class="nav-item" id="navUsers" style="display:none" onclick="showPage('users',this)"><span class="ni">👥</span> المستخدمين</div>
    </nav>
    <div class="sb-user">
      <div class="sb-av" id="userAvatar">أ</div>
      <div class="sb-ui"><div class="name" id="userName">—</div><div id="userRoleBadge"></div></div>
      <button class="logout-btn" onclick="logout()">⏻</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="page-title">قائمة <span>العملاء</span></div>
      <div class="topbar-right">
        <div class="sw"><span style="color:var(--muted)">🔍</span><input type="text" id="searchInput" placeholder="ابحث..." oninput="renderClients()"></div>
        <label class="btn-sec" id="importBtn" style="display:none;cursor:pointer">📥 استيراد Excel<input type="file" accept=".xlsx,.xls" style="display:none" onchange="importExcel(this)"></label>
        <button class="btn-add" id="addClientBtn" onclick="openAddModal()">＋ عميل جديد</button>
      </div>
    </div>
    <div class="content">
      <div id="clientsPage">
        <div class="view-tabs">
          <div class="view-tab active" onclick="setView('grid',this)">⊞ بطاقات</div>
          <div class="view-tab" onclick="setView('list',this)">☰ قائمة</div>
        </div>
        <div id="clientsContainer"></div>
      </div>
      <div id="historyPage" style="display:none"><div id="historyContainer"></div></div>
      <div id="usersPage" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <div style="font-size:15px;font-weight:700">إدارة المستخدمين</div>
          <button class="btn-add" onclick="openUserModal()">＋ مستخدم جديد</button>
        </div>
        <div class="users-grid" id="usersContainer"></div>
      </div>
    </div>
  </main>
</div>

<!-- ADD CLIENT -->
<div class="mo" id="addModal">
  <div class="modal">
    <div class="mh"><div class="mt">➕ إضافة عميل جديد</div><button class="mc" onclick="closeModal('addModal')">×</button></div>
    <div class="mb">
      <div class="ig"><label>اسم المصنع / الشركة *</label><input type="text" id="f_company" placeholder="مثال: أرامكو مصر"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="ig"><label>نوع الصناعة *</label>

const SURL='https://nbdensvoyvhpxsekiiqn.supabase.co';

async function sb(path,opts={}){
  const r=await fetch(`${SURL}/rest/v1/${path}`,{
    headers:{'apikey':SKEY,'Authorization':`Bearer ${SKEY}`,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
  const t=await r.text();
  if(!r.ok)throw new Error(t);
  return t?JSON.parse(t):[];
}

let CU=JSON.parse(localStorage.getItem('bz_u3')||'null');
let clients=[],allUsers=[],currentView='grid';

const IND={
  'Oil and Gas':{cls:'ind-petroleum',icon:'🛢️'},

  'Power Generation':{cls:'ind-other',icon:'⚡'},
  'Renewable Energy':{cls:'ind-other',icon:'♻️'},
  'Mining':{cls:'ind-other',icon:'⛏️'},
  'Steel':{cls:'ind-steel',icon:'🔩'},
  'Cement':{cls:'ind-cement',icon:'🏗️'},
  'Food and Pharmaceutical':{cls:'ind-food',icon:'🌾'},
  'Sugar':{cls:'ind-food',icon:'🍬'},
  'Military':{cls:'ind-other',icon:'🎖️'},

  'مياه':{cls:'ind-water',icon:'💧'},

  'أخرى':{cls:'ind-other',icon:'📦'},
};

const COLORS=['linear-gradient(135deg,#C8102E,#8B0A1F)','linear-gradient(135deg,#F4A300,#a06b00)','linear-gradient(135deg,#00c896,#007a5c)','linear-gradient(135deg,#3b82f6,#1d4ed8)','linear-gradient(135deg,#8b5cf6,#5b21b6)','linear-gradient(135deg,#ec4899,#9d174d)'];
function gc(s){let h=0;for(let c of s)h+=c.charCodeAt(0);return COLORS[h%COLORS.length];}
function isAdmin(){return CU?.role==='أدمن';}
function isManager(){return CU?.role==='مدير مبيعات'||isAdmin();}

if(CU)showApp();

async function login(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass){showErr('اكتب الإيميل وكلمة السر');return;}
  const btn=document.getElementById('loginBtn');
  btn.textContent='⏳ جاري الدخول...';btn.disabled=true;
  try{
    const users=await sb(`users?email=eq.${encodeURIComponent(email)}&password=eq.${encodeURIComponent(pass)}&active=eq.true&select=*`);
    if(!users.length){showErr('بيانات الدخول غلط أو الحساب موقف');return;}
    CU=users[0];
    localStorage.setItem('bz_u3',JSON.stringify(CU));
    showApp();
  }catch(e){showErr('خطأ في الاتصال، حاول تاني');}
  finally{btn.textContent='دخول ←';btn.disabled=false;}
}

function showErr(m){const e=document.getElementById('loginError');e.textContent='❌ '+m;e.style.display='block';}

function logout(){
  CU=null;localStorage.removeItem('bz_u3');
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('loginError').style.display='none';
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPass').value='';
}

function showApp(){
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('userName').textContent=CU.name;
  document.getElementById('userAvatar').textContent=CU.name[0];
  const rc={'أدمن':'r-admin','مدير مبيعات':'r-manager','مندوب مبيعات':'r-sales'};
  document.getElementById('userRoleBadge').innerHTML=`<span class="role-badge ${rc[CU.role]||'r-sales'}">${CU.role}</span>`;
  if(isAdmin()){document.getElementById('navUsers').style.display='flex';document.getElementById('importBtn').style.display='flex';}
  if(isManager()){document.getElementById('importBtn').style.display='flex';}
  loadClients();
}

function showPage(page,el){
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  if(el)el.classList.add('active');
  document.getElementById('clientsPage').style.display=page==='clients'?'block':'none';
  document.getElementById('historyPage').style.display=page==='history'?'block':'none';
  document.getElementById('usersPage').style.display=page==='users'?'block':'none';
  document.getElementById('addClientBtn').style.display=page==='clients'?'flex':'none';
  if(page==='history')renderHistory();
  if(page==='users')loadUsers();
}

async function loadClients(){
  document.getElementById('clientsContainer').innerHTML='<div class="loading"><div class="spin"></div> جاري التحميل...</div>';
  try{
    let q='clients?select=*,history(*)&order=created_at.desc';
    if(CU.role==='مندوب مبيعات'&&CU.region)q+=`&region=eq.${encodeURIComponent(CU.region)}`;
    clients=await sb(q);
    document.getElementById('clientsBadge').textContent=clients.length;
    renderClients();
  }catch(e){document.getElementById('clientsContainer').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><p>خطأ في التحميل - تأكد من إعدادات Supabase</p></div>';}
}

function renderClients(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const f=clients.filter(c=>(c.company||'').toLowerCase().includes(q)||(c.engineer||'').toLowerCase().includes(q)||(c.region||'').toLowerCase().includes(q)||(c.industry||'').toLowerCase().includes(q));
  const con=document.getElementById('clientsContainer');
  if(!clients.length){con.innerHTML='<div class="empty-state"><div class="empty-icon">🏭</div><p>لا يوجد عملاء بعد</p><small>اضغط "عميل جديد"</small></div>';return;}
  if(!f.length){con.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><p>لا توجد نتائج</p></div>';return;}
  if(currentView==='grid'){con.className='clients-grid';con.innerHTML=f.map((c,i)=>card(c,i)).join('');}
  else{con.className='clients-list';con.innerHTML=`<div class="li li-hdr"><div>الشركة</div><div>المهندس</div><div>الصناعة</div><div>المنطقة</div><div>تواصل</div></div>`+f.map((c,i)=>listI(c,i)).join('');}
}

  const ind=IND[c.industry]||IND['أخرى'];
  const h=(c.history||[]).length;
  return`<div class="client-card" style="animation-delay:${i*.04}s" onclick="openDetail('${c.id}')">
    <div class="cc-header"><div class="cc-av" style="background:${gc(c.company)}">${(c.company||'?')[0]}</div>

      <div class="cc-row"><span class="ind-badge ${ind.cls}">${ind.icon} ${c.industry||'—'}</span></div>
      <div class="cc-row">📍 <strong>${c.region||'—'}</strong></div>
      <div class="cc-row">📞 <strong style="direction:ltr">${c.phone||'—'}</strong></div>
      ${h?`<div class="cc-row">📋 <strong style="color:var(--gold)">${h} تعامل</strong></div>`:''}

    <div class="cc-actions" onclick="event.stopPropagation()">

}

        <button class="d-btn call" onclick="call('${c.phone||''}')">📞<span>اتصال</span></button>

        <div class="ii"><div class="il">المهندس</div><div class="iv">👷 ${c.engineer||'—'}</div></div>

async function addHistory(cid){
  const type=document.getElementById('h_type').value;

  const note=document.getElementById('h_note').value.trim();
  if(!title){showToast('❌ اكتب عنوان التعامل','error');return;}
  try{
    await sb('history',{method:'POST',body:JSON.stringify({client_id:cid,type,title,note,created_by:CU.id,created_by_name:CU.name})});
    showToast('✅ تم تسجيل التعامل','success');
    await loadClients();openDetail(cid);
  }catch(e){console.error('Save error:',e);showToast('❌ '+( e.message?.includes('RLS')||e.message?.includes('policy')?'خطأ في صلاحيات Supabase':e.message?.includes('violates')?'خطأ في البيانات':'خطأ في الحفظ'),'error');}
}

async function delClient(id){

    await sb(`history?client_id=eq.${id}`,{method:'DELETE'});

    showToast('🗑️ تم الحذف','success');closeModal('detailModal');loadClients();

}

function renderHistory(){
  const all=clients.flatMap(c=>(c.history||[]).map(h=>({...h,company:c.company}))).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  con.innerHTML=`<div class="hl">${all.map(h=>`<div class="hi"><div class="hd" style="background:${h.type==='بيع'?'var(--gold)':h.type==='زيارة'?'var(--green)':'var(--blue)'}"></div>
    <div class="hc"><div style="font-size:12px;color:var(--muted);margin-bottom:2px">🏭 ${h.company}</div><div class="ht">${h.type}</div><div class="htt">${h.title}</div>${h.note?`<div class="hn">${h.note}</div>`:''}<div class="hdate">📅 ${new Date(h.created_at).toLocaleDateString('ar-EG')} — 👤 ${h.created_by_name||'—'}</div></div></div>`).join('')}</div>`;

function importExcel(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const allRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      let headerIdx=0;
      const ckeys=['company name','الشركة','اسم الشركة','company'];
      for(let i=0;i<Math.min(10,allRows.length);i++){if(ckeys.some(k=>allRows[i].join('|').toLowerCase().includes(k))){headerIdx=i;break;}}
      const fr=allRows[0]||[];
      const isVert=fr.length>=4&&(fr[3]?.toString().includes('إسم')||fr[3]?.toString().includes('اسم')||fr[3]?.toString().includes('عميل'));
      let toInsert=[];
      const existing=new Set(clients.map(c=>c.company.trim()));
      if(isVert){
        let i=1;
        while(i<allRows.length){
          const row=allRows[i];const company=(row[3]||'').toString().trim();const address=(row[0]||'').toString().trim();
          if(!company){i++;continue;}
          if(existing.has(company)){i++;while(i<allRows.length&&!allRows[i][3])i++;continue;}
          let phone='',mobile='',email='';
          const t0=(row[2]||'').toString().trim(),v0=(row[1]||'').toString().trim();
          if(t0==='تليفون')phone=v0;else if(t0==='محمول')mobile=v0;else if(t0==='بريد إلكترونى')email=v0;
          i++;
          while(i<allRows.length&&!allRows[i][3]){const t=(allRows[i][2]||'').toString().trim(),v=(allRows[i][1]||'').toString().trim();if(t==='محمول')mobile=v;else if(t==='تليفون'&&!phone)phone=v;else if(t==='بريد إلكترونى')email=v;i++;}
          toInsert.push({company,industry:'أخرى',region:exReg(address)||'غير محدد',address,engineer:'غير محدد',phone:mobile||phone||'غير محدد',email,added_by:CU.id});
          existing.add(company);
        }
      }else{
        const headers=allRows[headerIdx];
        const rows=allRows.slice(headerIdx+1).map(r=>{const o={};headers.forEach((h,j)=>o[h]=r[j]);return o;});
        let lc=null,la=null;
        rows.forEach(row=>{
          const company=(row['Company Name']||row['company name']||row['اسم الشركة']||row['الشركة']||'').toString().trim();
          const address=(row['address']||row['Address']||row['العنوان']||'').toString().trim();
          const ec=company||lc,ea=address||la;
          if(company){lc=company;la=address;}
          if(!company)return;
          if(existing.has(ec))return;
          const phone=(row['mobile']||row['Mobile']||row['Mob ']||row['Tel ']||row['Telephone']||'').toString().trim();
          const email=(row['E-mail']||row['email']||row['e-mail']||'').toString().trim();
          const contact=(row['Contact Name']||row['اسم الشخص  ']||row['اسم الشخص']||'').toString().trim();
          toInsert.push({company:ec,industry:'أخرى',region:exReg(ea)||'غير محدد',address:ea,engineer:contact||'غير محدد',phone:phone||'غير محدد',email,added_by:CU.id});
          existing.add(ec);
        });
      }
      if(!toInsert.length){showToast('⚠️ لا يوجد عملاء جدد','error');input.value='';return;}
      let added=0;
      for(let i=0;i<toInsert.length;i+=50){
        const batch=toInsert.slice(i,i+50);
        await sb('clients',{method:'POST',body:JSON.stringify(batch)});
        added+=batch.length;
      }
      showToast(`✅ تم استيراد ${added} عميل`,'success');loadClients();
    }catch(err){console.error('Import error:',err);showToast('❌ '+(err.message?.includes('RLS')||err.message?.includes('policy')?'خطأ في صلاحيات Supabase':err.message?.includes('XLSX')||err.message?.includes('read')?'خطأ في قراءة الملف':'خطأ في الاستيراد'),'error');}
    input.value='';
  };
  reader.readAsBinaryString(file);
}

function exReg(addr){const rs=['القاهرة','الجيزة','الإسكندرية','الدقهلية','البحر الأحمر','البحيرة','الفيوم','الغربية','الإسماعيلية','المنوفية','المنيا','القليوبية','الوادي الجديد','السويس','أسوان','أسيوط','بني سويف','بورسعيد','دمياط','الشرقية','جنوب سيناء','كفر الشيخ','مطروح','الأقصر','قنا','شمال سيناء','سوهاج','السادس من أكتوبر','العاشر من رمضان'];for(let r of rs){if(addr&&addr.includes(r))return r;}return '';}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.mo').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

let tt;
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),3000);}
</script>
